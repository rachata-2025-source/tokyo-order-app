<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Ma Kin Tokyo Order Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="มากินโตเกียว">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #FF9800; --primary-dark: #F57C00; --secondary: #2196F3;
            --success: #4CAF50; --danger: #F44336; --bg: #F8F9FA;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.05); --border-radius: 16px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; margin-bottom: 60px; transition: background 0.3s; }
        
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: var(--border-radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.02); position: relative; }
        
        /* สไตล์ปุ่มระบบเน็ต */
        .btn-sync-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-sync-group button { flex: 1; border: none; padding: 12px; border-radius: 12px; color: white; cursor: pointer; font-family: 'Kanit'; font-weight: 500; transition: all 0.3s; }
        .offline-mode { opacity: 0.4; filter: grayscale(1); pointer-events: none; }

        /* สไตล์หน้าจดออเดอร์ */
        .section-title { font-size: 0.95rem; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 600; }
        .fillings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .fillings-grid input { display: none; }
        .fillings-grid span { display: block; background: #f0f0f0; padding: 8px 4px; border-radius: 12px; text-align: center; font-size: 1rem; transition: 0.2s; border: 2px solid transparent; }
        .fillings-grid input:checked + span { background: #FFF3E0; border-color: var(--primary); color: var(--primary-dark); font-weight: 600; }

        .btn { border: none; border-radius: 12px; padding: 12px; font-family: 'Kanit'; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 1.1rem; }
        
        .tabs { display: flex; gap: 6px; margin: 15px 0; background: #eee; padding: 4px; border-radius: 14px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.85rem; color: #777; }
        .tab.active { background: #fff; color: var(--secondary); font-weight: 600; }

        .current-item { border-bottom: 1px solid #f1f1f1; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .qty-mini-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: #fff; display: flex; align-items: center; justify-content: center; }
        
        body.dark { --bg: #121212; color: #eee; }
        body.dark .card { background: #1E1E1E; border-color: #333; }
        body.dark .fillings-grid span { background: #2A2A2A; color: #ddd; }
    </style>
</head>
<body>

<div class="container">
    <button id="darkToggle" style="position:fixed; top:12px; right:12px; z-index:99; border:none; background:#333; color:#fff; padding:8px; border-radius:50%; width:40px; height:40px;">🌙</button>

    <div class="btn-sync-group">
        <button onclick="uploadAllUnsynced(this)" class="btn-sync" style="background: var(--success);">📤 อัปโหลดข้อมูล</button>
        <button onclick="loadTodayBillsFromFirebase(this)" class="btn-load" style="background: var(--secondary);">📥 ดึงข้อมูลวันนี้</button>
    </div>

    <div class="card">
        <span class="section-title">สั่งขนม - ร้านมากินโตเกียว</span>
        <div class="fillings-grid" id="fillingsBox"></div>
        
        <div style="display: flex; gap: 8px; margin-bottom: 15px;">
            <div style="flex: 1; background: #F1F3F5; padding: 5px; border-radius: 12px; display:flex; justify-content:space-around; align-items:center;">
                <button class="qty-mini-btn" onclick="changeGlobalQty(-1)">−</button>
                <input type="number" id="pieceQty" value="1" readonly style="border:none; background:transparent; width:30px; text-align:center; font-weight:600;">
                <button class="qty-mini-btn" onclick="changeGlobalQty(1)">＋</button>
            </div>
            <button class="btn btn-add" style="flex: 2;" onclick="addPiece()">➕ เพิ่มลงบิล</button>
        </div>

        <div id="currentBillContainer" style="border-top: 2px solid #f5f5f5; padding-top: 10px;">
            <span class="section-title" id="currentBillHeader">รายการในบิล (0 ชิ้น)</span>
            <div id="currentBill"></div>
            <textarea id="billNote" style="width:100%; height:40px; border:1px solid #eee; border-radius:10px; padding:8px; margin-top:10px; font-family:'Kanit';" placeholder="หมายเหตุ..."></textarea>
            <button id="mainSaveBtn" class="btn btn-save" onclick="saveBill()" style="margin-top:10px;">💾 บันทึกและเปิดบิล (0.-)</button>
        </div>
    </div>

    <div class="tabs">
        <div id="tabDoing" class="tab active" onclick="switchView('doing')">กำลังทำ 🔥</div>
        <div id="tabDone" class="tab" onclick="switchView('done')">เสร็จแล้ว ✅</div>
        <div id="tabSummary" class="tab" onclick="switchView('summary')">สรุปยอด 📊</div>
    </div>

    <div id="billList"></div>
    <div id="summaryBox" class="card" style="display:none;"></div>
</div>

<script type="module">
    // --- ตั้งค่า Firebase & ตัวแปรหลัก ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, setDoc, doc, query, where, orderBy, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx6SGBBh979y6cjyOL75f5PdSr8AZkz0g",
        authDomain: "tokyo-order-app.firebaseapp.com",
        projectId: "tokyo-order-app",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.fbFirestore = { doc, setDoc, collection, getDocs, query, where, orderBy };

    const KEY = 'TOKYO_BILLS_LOCAL';
    let currentPieces = [];
    let view = 'doing';
    const BASE = 10;
    const fillings = ['ข้าวโพด','หวาน','เค็ม','รวม','พริกเผา','หมูหยอง','พิษซ่า','ฮอตดอก','หมูสับ','ปูอัด','ไข่','ชีสยืด'];

    // --- ระบบเช็คเน็ต ---
    function isOnline() {
        if (!navigator.onLine) {
            Swal.fire('ไม่มีอินเทอร์เน็ต', 'กรุณาเปิดเน็ตเพื่อใช้งานส่วนคลาวด์ครับ', 'warning');
            return false;
        }
        return true;
    }

    function updateNetworkUI() {
        const btns = document.querySelectorAll('.btn-sync-group button');
        btns.forEach(b => navigator.onLine ? b.classList.remove('offline-mode') : b.classList.add('offline-mode'));
    }
    window.addEventListener('online', updateNetworkUI);
    window.addEventListener('offline', updateNetworkUI);
    updateNetworkUI();

    // --- ฟังก์ชันจัดการออเดอร์ ---
    const fillingsBox = document.getElementById('fillingsBox');
    fillingsBox.innerHTML = fillings.map(f => `<label><input type="checkbox" value="${f}"><span>${f}</span></label>`).join('');

    window.changeGlobalQty = (val) => {
        const input = document.getElementById('pieceQty');
        let v = parseInt(input.value) + val;
        if(v < 1) v = 1;
        input.value = v;
    };

    window.addPiece = () => {
        const checked = [...document.querySelectorAll('#fillingsBox input:checked')].map(i => i.value);
        const qty = parseInt(document.getElementById('pieceQty').value);
        if(!checked.length) return Swal.fire('ลืมเลือกไส้หรือเปล่า?', '', 'warning');
        
        let price = BASE;
        if(checked.includes('ไข่')) price += 5;
        if(checked.includes('ชีสยืด')) price += 10;

        currentPieces.push({ items: checked, price: price, qty: qty, synced: false });
        
        document.querySelectorAll('#fillingsBox input').forEach(c => c.checked = false);
        document.getElementById('pieceQty').value = 1;
        renderCurrent();
    };

    function renderCurrent() {
        const box = document.getElementById('currentBill');
        const total = currentPieces.reduce((sum, p) => sum + (p.price * p.qty), 0);
        const count = currentPieces.reduce((sum, p) => sum + p.qty, 0);
        
        document.getElementById('currentBillHeader').innerText = `รายการในบิล (${count} ชิ้น)`;
        document.getElementById('mainSaveBtn').innerText = `💾 บันทึกและเปิดบิล (${total}.-)`;
        
        box.innerHTML = currentPieces.map((p, i) => `
            <div class="current-item">
                <span>${p.items.join('+')} x ${p.qty}</span>
                <button onclick="removePiece(${i})" style="border:none; color:red; background:none;">✕</button>
            </div>
        `).join('');
    }

    window.removePiece = (i) => { currentPieces.splice(i, 1); renderCurrent(); };

    // --- ฟังก์ชันบันทึกข้อมูล (ลง Local & Firebase) ---
    window.saveBill = async () => {
        if(!currentPieces.length) return;
        const billId = crypto.randomUUID();
        const today = new Date().toISOString().slice(0,10);
        
        const billData = {
            id: billId,
            pieces: currentPieces,
            note: document.getElementById('billNote').value,
            status: 'doing',
            date: today,
            createdAt: new Date().toISOString(),
            synced: false
        };

        // เซฟลง Local ก่อนเสมอ
        const local = JSON.parse(localStorage.getItem(KEY) || '[]');
        local.push(billData);
        localStorage.setItem(KEY, JSON.stringify(local));

        currentPieces = [];
        document.getElementById('billNote').value = '';
        renderCurrent();
        renderBills();
        Swal.fire({ title: 'จดออเดอร์แล้ว!', icon: 'success', timer: 1000, showConfirmButton: false });
    };

    // --- ฟังก์ชันอัปโหลด/ดึงข้อมูล (Cloud) ---
    window.uploadAllUnsynced = async (btn) => {
        if(!isOnline()) return;
        const local = JSON.parse(localStorage.getItem(KEY) || '[]');
        const targets = local.filter(b => !b.synced);
        if(!targets.length) return Swal.fire('ไม่มีข้อมูลค้างซิงค์', '', 'info');

        btn.disabled = true;
        try {
            for(let b of targets) {
                await setDoc(doc(db, 'bills', b.id), b);
                b.synced = true;
            }
            localStorage.setItem(KEY, JSON.stringify(local));
            Swal.fire('อัปโหลดสำเร็จ!', '', 'success');
            renderBills();
        } catch(e) { Swal.fire('ผิดพลาด', e.message, 'error'); }
        btn.disabled = false;
    };

    window.loadTodayBillsFromFirebase = async (btn) => {
        if(!isOnline()) return;
        btn.disabled = true;
        try {
            const today = new Date().toISOString().slice(0,10);
            const q = query(collection(db, 'bills'), where('date', '==', today));
            const snap = await getDocs(q);
            const cloudBills = snap.docs.map(d => ({...d.data(), synced: true}));
            
            localStorage.setItem(KEY, JSON.stringify(cloudBills));
            renderBills();
            Swal.fire('ดึงข้อมูลวันนี้มาแล้ว', '', 'success');
        } catch(e) { Swal.fire('ผิดพลาด', e.message, 'error'); }
        btn.disabled = false;
    };

    window.renderBills = () => {
        const list = document.getElementById('billList');
        const local = JSON.parse(localStorage.getItem(KEY) || '[]');
        const filtered = local.filter(b => b.status === view).reverse();
        
        list.innerHTML = filtered.map(b => `
            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <b>ออเดอร์ #${b.id.slice(0,4)}</b>
                    <span style="color:${b.synced ? 'green':'gray'}">${b.synced ? '☁️':'⏳'}</span>
                </div>
                <div>${b.pieces.map(p => `• ${p.items.join('+')} x${p.qty}`).join('<br>')}</div>
                ${b.note ? `<small>📝 ${b.note}</small>` : ''}
            </div>
        `).join('');
    };

    window.switchView = (v) => {
        view = v;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab' + v.charAt(0).toUpperCase() + v.slice(1)).classList.add('active');
        renderBills();
    };

    document.getElementById('darkToggle').onclick = () => document.body.classList.toggle('dark');
    renderBills();
</script>

</body>
</html>
