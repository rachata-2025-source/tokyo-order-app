<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Tokyo Order Pro - Modern System V2.2 (Net-Check)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="มากินโตเกียว">
    <link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #FF9800; --primary-dark: #F57C00; --secondary: #2196F3;
            --success: #4CAF50; --danger: #F44336; --bg: #F8F9FA;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.05); --border-radius: 16px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; transition: background 0.3s; }
        
        /* สไตล์ปุ่มสถานะเน็ต */
        .btn-sync-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-sync-group button { flex: 1; transition: all 0.3s ease; }
        .offline-mode { opacity: 0.5; filter: grayscale(0.5); pointer-events: none; }
        
        /* สไตล์อื่นๆ ตามต้นฉบับ V2.2 */
        .card { background: #fff; border-radius: var(--border-radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); }
        .loading { position: relative; pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <div class="btn-sync-group">
        <button onclick="uploadAllUnsynced(this)" class="btn-sync" style="background: var(--success); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer;">
            📤 อัปโหลดข้อมูล
        </button>
        <button onclick="loadTodayBillsFromFirebase(this)" class="btn-load" style="background: var(--secondary); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer;">
            📥 ดึงข้อมูลวันนี้
        </button>
    </div>

    <div id="mainContent">
        </div>
</div>

<script>
  const KEY = 'TOKYO_BILLS_LOCAL';

  // --- 1. ฟังก์ชันตรวจสอบอินเทอร์เน็ต ---
  function isOnline() {
    if (!navigator.onLine) {
      Swal.fire({
        title: 'ไม่มีอินเทอร์เน็ต',
        text: 'ฟีเจอร์นี้ต้องใช้เน็ต กรุณาตรวจสอบการเชื่อมต่อครับ',
        icon: 'warning',
        confirmButtonColor: 'var(--primary)'
      });
      return false;
    }
    return true;
  }

  // --- 2. อัปเดตหน้าตาปุ่มตามสถานะเน็ตอัตโนมัติ ---
  function updateNetworkUI() {
    const syncButtons = document.querySelectorAll('.btn-sync, .btn-load');
    if (!navigator.onLine) {
      syncButtons.forEach(btn => btn.classList.add('offline-mode'));
    } else {
      syncButtons.forEach(btn => btn.classList.remove('offline-mode'));
    }
  }

  window.addEventListener('online', updateNetworkUI);
  window.addEventListener('offline', updateNetworkUI);
  updateNetworkUI(); // เรียกใช้ครั้งแรกตอนโหลดหน้า

  // --- 3. ฟังก์ชันอัปโหลดข้อมูล (ปรับปรุง) ---
  window.uploadAllUnsynced = async function(btn) {
    if (!isOnline()) return; // เช็คเน็ตก่อนเริ่ม

    const localBills = JSON.parse(localStorage.getItem(KEY) || '[]');
    const targetBills = localBills.filter(b => !b.synced);

    if(targetBills.length === 0) {
      return Swal.fire('ข้อมูลเป็นปัจจุบัน', 'ไม่มีข้อมูลค้างซิงค์ครับ', 'info');
    }

    if(btn.disabled) return;
    btn.disabled = true;
    btn.classList.add('loading');
    const oldText = btn.textContent;
    btn.textContent = 'กำลังอัปโหลด...';

    try {
      const { doc, setDoc } = window.fbFirestore; 
      for(let b of targetBills) {
        await setDoc(doc(window.db, 'bills', b.id), b, { merge: true });
        b.synced = true;
      }
      localStorage.setItem(KEY, JSON.stringify(localBills));
      Swal.fire('สำเร็จ!', `อัปโหลด ${targetBills.length} รายการแล้ว`, 'success');
      if(typeof renderBills === 'function') renderBills();
    } catch(err) {
      console.error(err);
      Swal.fire('ผิดพลาด', 'อัปโหลดไม่สำเร็จ กรุณาลองใหม่', 'error');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = oldText;
  }
</script>

<script type="module">
  import {
    collection,
    getDocs,
    query,
    where,
    doc,
    setDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ส่งออกไปให้ script ด้านบนเรียกใช้ได้
  window.fbFirestore = { collection, getDocs, query, where, doc, setDoc };

  // --- 4. ฟังก์ชันดึงข้อมูล (ปรับปรุง) ---
  window.loadTodayBillsFromFirebase = async function(btn) {
    if (!navigator.onLine) { // ใช้ navigator.onLine ตรงๆ หรือเรียก isOnline() ก็ได้
      Swal.fire('Offline', 'กรุณาเชื่อมต่ออินเทอร์เน็ตเพื่อดึงข้อมูลคลาวด์', 'error');
      return;
    }

    if(btn.disabled) return;
    btn.disabled = true;
    btn.classList.add('loading');
    const oldText = btn.textContent;
    btn.textContent = 'กำลังดึงข้อมูล...';

    try {
      const today = new Date().toISOString().slice(0,10);
      const q = query(collection(window.db, 'bills'), where('date', '==', today));

      const snap = await getDocs(q);
      const pulledBills = snap.docs.map(d => ({ ...d.data(), synced: true }));

      const localBills = JSON.parse(localStorage.getItem(KEY) || '[]');
      
      // รวมข้อมูลโดยไม่ให้ซ้ำ (ใช้ฟังก์ชัน mergeBills เดิมของคุณ)
      let merged;
      if (typeof mergeBills === 'function') {
          merged = mergeBills(localBills, pulledBills);
      } else {
          merged = pulledBills; // fallback หากไม่มีฟังก์ชัน merge
      }
      
      localStorage.setItem(KEY, JSON.stringify(merged));
      if(typeof renderBills === 'function') renderBills();
      
      Swal.fire('สำเร็จ', `ดึงข้อมูลมาแล้ว ${pulledBills.length} รายการ`, 'success');
    } catch(err) {
      console.error(err);
      Swal.fire('ผิดพลาด', 'ไม่สามารถเข้าถึงฐานข้อมูลได้', 'error');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = oldText;
  }
</script>

</body>
</html>
