<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Tokyo Order Pro - V2.7 Offline Ready</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #FF9800; --primary-dark: #F57C00; --secondary: #2196F3;
            --success: #4CAF50; --danger: #F44336; --bg: #F8F9FA;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.05); --border-radius: 16px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; margin-bottom: 60px;}
        .container { max-width: 90%; margin: 0 auto; }
        .card { background: #fff; border-radius: var(--border-radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.02); position: relative; transition: 0.2s; }
        .section-title { font-size: 0.95rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; font-weight: 600; }
        
        .filter-bar { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
        .filter-btn { background: #eee; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; font-family: 'Kanit'; cursor: pointer; }
        .filter-btn.active { background: var(--secondary); color: white; }

        .fillings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .fillings-grid input { display: none; }
        .fillings-grid span { display: block; background: #f0f0f0; padding: 8px 4px; border-radius: 12px; text-align: center; font-size: 1.1rem; transition: 0.2s; border: 2px solid transparent; }
        .fillings-grid input:checked + span { background: #FFF3E0; border-color: var(--primary); color: var(--primary-dark); font-weight: 600; }

        .current-item { border-bottom: 1px solid #f1f1f1; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .item-info { flex: 1; font-size: 0.95rem; }
        .qty-mini-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .price-input { width: 45px; border: 1px solid #eee; padding: 4px; border-radius: 6px; text-align: center; font-family: 'Kanit'; font-size: 0.9rem; }

        .btn { border: none; border-radius: 12px; padding: 12px; font-family: 'Kanit'; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 1.1rem; margin-top: 4px; }
        .btn-outline { background: #fff; border: 1.5px solid #eee; color: #666; }
        .btn-sm { padding: 6px 10px; font-size: 0.8rem; border-radius: 8px; }
        
        .tabs { display: flex; gap: 6px; margin: 15px 0; background: #eee; padding: 4px; border-radius: 14px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.85rem; color: #777; }
        .tab.active { background: #fff; color: var(--secondary); font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .bill-actions { display: none; margin-top: 12px; gap: 8px; padding-top: 12px; border-top: 1px dashed #eee; }
        .card.expanded .bill-actions { display: flex; }

        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        
        body.dark { --bg: #121212; background-color: var(--bg); color: #eee; }
        body.dark .card { background: #1E1E1E; border: 1px solid #333; }
        body.dark .fillings-grid span { background: #2A2A2A; color: #ddd; }

        .pay-toggle { border: 1.5px solid #ddd; background: #fff; color: #999; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .pay-toggle.paid { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; font-weight: 600; }
        
        .swal2-popup { font-family: 'Kanit', sans-serif !important; border-radius: 20px !important; }
        .swal2-confirm, .swal2-cancel { border-radius: 12px !important; font-family: 'Kanit', sans-serif !important; }
    </style>
</head>
<body>

<div class="container">
    <button id="darkToggle" style="position:fixed; top:12px; right:12px; z-index:99; border:none; background:#333; color:#fff; padding:8px; border-radius:50%; width:40px; height:40px; cursor:pointer;">🌙</button>

    <div class="card">
        <span class="section-title">สั่งขนม</span>
        <div class="fillings-grid" id="fillingsBox"></div>

        <button id="btnShowCustom" class="btn btn-outline btn-sm" onclick="toggleCustomArea(true)" style="width:100%; margin-bottom:10px;">➕ ระบุไส้/ราคาเอง</button>
        <div id="customInputArea" class="card" style="display:none; background:#f9f9f9; border:1px dashed #ccc; padding: 10px; margin-bottom: 15px;">
            <input type="text" id="customName" placeholder="ชื่อรายการ (เช่น แป้งเปล่า)" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd; margin-bottom:8px; font-family:'Kanit';">
            <input type="number" id="customPrice" placeholder="ราคา" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd; margin-bottom:8px; font-family:'Kanit';">
            <div style="display:flex; gap:5px;">
                <button class="btn btn-save btn-sm" style="flex:1" onclick="addCustomPiece()">ตกลง</button>
                <button class="btn btn-outline btn-sm" style="flex:1" onclick="toggleCustomArea(false)">ยกเลิก</button>
            </div>
        </div>
        
        <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 15px;">
            <div style="flex: 1; background: #F1F3F5; padding: 5px; border-radius: 12px; display:flex; justify-content:space-around; align-items:center;">
                <button class="qty-mini-btn" onclick="changeGlobalQty(-1)">−</button>
                <input type="number" id="pieceQty" value="1" readonly style="border:none; background:transparent; width:35px; text-align:center; font-weight:600;">
                <button class="qty-mini-btn" onclick="changeGlobalQty(1)">＋</button>
            </div>
            <button class="btn btn-add" style="flex: 2;" onclick="addPiece()">➕ เพิ่มลงบิล</button>
        </div>

        <div id="currentBillContainer" style="border-top: 2px solid #f5f5f5; padding-top: 10px;">
            <span class="section-title" id="currentBillHeader">รายการในบิล (0 ชิ้น)</span>
            <div id="currentBill"></div>
            <textarea id="billNote" style="width:100%; height:40px; border:1px solid #eee; border-radius:10px; padding:8px; font-family:'Kanit'; margin-top:10px;" placeholder="หมายเหตุ..."></textarea>
            
            <div id="saveBtnArea" style="display:flex; gap:8px;">
                <button id="mainSaveBtn" class="btn btn-save" style="flex:3;" onclick="saveBill()">💾 บันทึกและเปิดบิล (0.-)</button>
                <button id="cancelEditBtn" class="btn btn-outline" style="flex:1; display:none; margin-top:10px; background:#FFF5F5; color:var(--danger); border-color:var(--danger);" onclick="cancelEdit()">✖ ยกเลิก</button>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div id="tabDoing" class="tab active" onclick="switchView('doing')">กำลังทำ 🔥</div>
        <div id="tabDone" class="tab" onclick="switchView('done')">เสร็จแล้ว ✅</div>
        <div id="tabSummary" class="tab" onclick="switchView('summary')">สรุปยอด 📊</div>
    </div>

    <div id="filterArea" class="filter-bar" style="display:none;">
        <button class="filter-btn active" onclick="setFilter('today', this)">วันนี้</button>
        <button class="filter-btn" onclick="setFilter('yesterday', this)">เมื่อวาน</button>
        <button class="filter-btn" onclick="setFilter('week', this)">สัปดาห์นี้</button>
        <button class="filter-btn" onclick="setFilter('month', this)">เดือนนี้</button>
        <button class="filter-btn" onclick="setFilter('all', this)">ทั้งหมด</button>
        <button class="filter-btn" onclick="setFilter('custom', this)" style="border: 1px dashed var(--secondary);">📅 เลือกวันเอง</button>
    </div>

    <div id="customDateInput" class="card" style="display:none; padding:10px; margin-bottom:12px;">
        <div style="display:flex; gap:8px; align-items:center;">
            <input type="date" id="startDate" class="filter-btn" style="flex:1; border:1px solid #ddd; height:35px;">
            <span>ถึง</span>
            <input type="date" id="endDate" class="filter-btn" style="flex:1; border:1px solid #ddd; height:35px;">
            <button class="btn btn-save btn-sm" onclick="applyCustomFilter()" style="margin:0; height:35px; width:auto; padding:0 15px;">ตกลง</button>
        </div>
    </div>

    <div id="billList"></div>
    <div id="summaryBox" class="card" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    initializeFirestore, 
    persistentLocalCache, 
    persistentMultipleTabManager,
    collection, getDocs, setDoc, doc, query, where, orderBy, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCx6SGBBh979y6cjyOL75f5PdSr8AZkz0g",
    authDomain: "tokyo-order-app.firebaseapp.com",
    projectId: "tokyo-order-app",
};

const app = initializeApp(firebaseConfig);

// ตั้งค่า Firestore แบบใหม่ รองรับ Offline และหลายหน้าต่างพร้อมกัน
const db = initializeFirestore(app, {
  localCache: persistentLocalCache({
    tabManager: persistentMultipleTabManager() 
  })
});

// หมายเหตุ: ลบส่วน enableIndexedDbPersistence(db) ของเดิมทิ้งได้เลยครับ
// เพราะมันถูกจัดการด้วยคำสั่งด้านบนเรียบร้อยแล้ว

let currentPieces = [];
let view = 'doing';
let timeFilter = 'today';
let editingBillId = null;
const BASE = 10;

const fillings = [
    'ข้าวโพด','หวาน','เค็ม','รวม','พริกเผา','หมูหยอง','พิษซ่า','ฮอตดอก',
    'หมูสับ','ปูอัด','ซอสไข่กุ้ง','ยำสาหร่าย','ซอสชีส','นูเทลล่า',
    'ฝอยทอง','สตรอเบอรี่','ใบเตย','ไข่','ครีมข้าวโพด','ชีสยืด'
];

const formatTime = (isoString, mode) => {
    if (!isoString) return '';
    const date = new Date(isoString);
    const timeStr = date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const dateStr = date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
    if (mode === 'doing') return timeStr;
    return `${dateStr} ${timeStr}`;
};

const fillingsBox = document.getElementById('fillingsBox');
fillingsBox.innerHTML = fillings.map(f => `<label><input type="checkbox" value="${f}"><span>${f}</span></label>`).join('');

window.changeGlobalQty = (val) => {
    const input = document.getElementById('pieceQty');
    let v = parseInt(input.value) + val;
    if(v < 1) v = 1;
    input.value = v;
};

window.toggleCustomArea = (show) => {
    document.getElementById('customInputArea').style.display = show ? 'block' : 'none';
    document.getElementById('btnShowCustom').style.display = show ? 'none' : 'block';
};

window.addCustomPiece = () => {
    const name = document.getElementById('customName').value;
    const price = parseInt(document.getElementById('customPrice').value);
    const qty = parseInt(document.getElementById('pieceQty').value);
    if(!name || isNaN(price)) return showToast('กรอกชื่อและราคาให้ครบ', 'warning');
    currentPieces.push({ items: [name], price: price, qty: qty });
    document.getElementById('customName').value = '';
    document.getElementById('customPrice').value = '';
    document.getElementById('pieceQty').value = 1;
    toggleCustomArea(false);
    renderCurrent();
};

window.addPiece = () => {
    const checked = [...document.querySelectorAll('#fillingsBox input:checked')].map(i => i.value);
    const qty = parseInt(document.getElementById('pieceQty').value);
    if(!checked.length) return showToast('เลือกไส้ก่อนนะ', 'warning');
    
    let price = BASE;
    if(checked.includes('นูเทลล่า') && checked.includes('ฝอยทอง')) price = 15;
    if(checked.includes('ข้าวโพด') && checked.includes('ยำสาหร่าย')) price = 15;
    if(checked.includes('ไข่') || checked.includes('ซอสไข่กุ้ง')) price += 5;
    if(checked.includes('ชีสยืด')) price += 10;

    const newItemCombo = checked.join('+');
    const existingIndex = currentPieces.findIndex(p => 
        p.items.join('+') === newItemCombo && p.price === price
    );

    if (existingIndex !== -1) {
        currentPieces[existingIndex].qty += qty;
    } else {
        currentPieces.push({ items: checked, price: price, qty: qty });
    }

    document.querySelectorAll('#fillingsBox input').forEach(c => c.checked = false);
    document.getElementById('pieceQty').value = 1; 
    renderCurrent();
};

window.editCurrentPieceQty = (index, val) => {
    currentPieces[index].qty += val;
    if(currentPieces[index].qty < 1) currentPieces.splice(index, 1);
    renderCurrent();
};

window.editCurrentPiecePrice = (index, newPrice) => {
    currentPieces[index].price = parseInt(newPrice) || 0;
    renderCurrentPriceOnly();
};

window.cancelEdit = async () => {
    const result = await Swal.fire({
        title: 'ยกเลิกการแก้ไข?',
        text: "รายการที่คุณแก้ไขไว้จะหายไป",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: 'var(--secondary)',
        cancelButtonColor: '#aaa',
        confirmButtonText: 'ใช่, ยกเลิกเลย',
        cancelButtonText: 'กลับไปแก้ต่อ'
    });
    if (result.isConfirmed) {
        currentPieces = [];
        editingBillId = null;
        document.getElementById('billNote').value = '';
        renderCurrent();
        showToast('ยกเลิกการแก้ไขแล้ว');
    }
};

function renderCurrent() {
    const box = document.getElementById('currentBill');
    const totalQty = currentPieces.reduce((sum, p) => sum + p.qty, 0);
    document.getElementById('currentBillHeader').innerText = `รายการในบิล (${totalQty} ชิ้น)`;
    box.innerHTML = currentPieces.map((p, i) => `
        <div class="current-item">
            <div class="item-info"><b>${p.items.join('+')}</b></div>
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="number" class="price-input" value="${p.price}" onchange="editCurrentPiecePrice(${i}, this.value)">
                <div style="display:flex; align-items:center; gap:5px; background:#f1f1f1; border-radius:20px; padding:2px 8px;">
                    <button class="qty-mini-btn" style="width:22px; height:22px;" onclick="editCurrentPieceQty(${i}, -1)">−</button>
                    <span style="min-width:20px; text-align:center; font-weight:600;">${p.qty}</span>
                    <button class="qty-mini-btn" style="width:22px; height:22px;" onclick="editCurrentPieceQty(${i}, 1)">＋</button>
                </div>
            </div>
        </div>
    `).join('');
    renderCurrentPriceOnly();
}

function renderCurrentPriceOnly() {
    const total = currentPieces.reduce((sum, p) => sum + (p.price * p.qty), 0);
    const saveBtn = document.getElementById('mainSaveBtn');
    const cancelBtn = document.getElementById('cancelEditBtn');
    if (editingBillId) {
        saveBtn.innerText = `🆙 อัปเดตบิลนี้ (${total}.-)`;
        saveBtn.style.background = "var(--secondary)";
        cancelBtn.style.display = 'inline-flex';
    } else {
        saveBtn.innerText = `💾 บันทึกและเปิดบิล (${total}.-)`;
        saveBtn.style.background = "var(--success)";
        cancelBtn.style.display = 'none';
    }
}

window.switchView = (v) => {
    view = v;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + v.charAt(0).toUpperCase() + v.slice(1)).classList.add('active');
    document.getElementById('filterArea').style.display = (v === 'doing') ? 'none' : 'flex';
    if(v === 'doing') document.getElementById('customDateInput').style.display = 'none';
    renderBills();
};

window.setFilter = (f, btn) => {
    timeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('customDateInput').style.display = (f === 'custom') ? 'block' : 'none';
    if(f !== 'custom') {
        if(view === 'summary') renderSummary(); else renderBills();
    }
};

window.applyCustomFilter = () => {
    const s = document.getElementById('startDate').value;
    const e = document.getElementById('endDate').value;
    if(!s || !e) return showToast('เลือกวันที่ให้ครบก่อนครับ', 'warning');
    if(view === 'summary') renderSummary(); else renderBills();
};

function getFilterDates() {
    const now = new Date();
    let start = new Date(); start.setHours(0,0,0,0);
    let end = new Date(); end.setHours(23,59,59,999);
    if(timeFilter === 'yesterday') {
        start.setDate(start.getDate() - 1);
        end = new Date(start); end.setHours(23,59,59,999);
    } else if(timeFilter === 'week') {
        start.setDate(now.getDate() - now.getDay());
    } else if(timeFilter === 'month') {
        start.setDate(1);
    } else if(timeFilter === 'all') {
        start = new Date(2024, 0, 1);
    } else if(timeFilter === 'custom') {
        const s = document.getElementById('startDate').value;
        const e = document.getElementById('endDate').value;
        if(s && e) {
            start = new Date(s); start.setHours(0,0,0,0);
            end = new Date(e); end.setHours(23,59,59,999);
        }
    }
    return { start: start.toISOString(), end: end.toISOString() };
}

window.toggleBillActions = (el) => {
    const isExpanded = el.classList.contains('expanded');
    document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
    if(!isExpanded) el.classList.add('expanded');
};

window.togglePaidUI = (btn) => {
    btn.classList.toggle('paid');
    btn.innerText = btn.classList.contains('paid') ? '✅ จ่ายแล้ว' : '💰 ยังไม่จ่าย';
};

window.renderBills = async () => {
    const list = document.getElementById('billList');
    const summary = document.getElementById('summaryBox');
    list.innerHTML = 'กำลังโหลด...';
    if(view === 'summary') {
        list.style.display = 'none'; summary.style.display = 'block';
        renderSummary(); return;
    }
    list.style.display = 'block'; summary.style.display = 'none';
    const dates = getFilterDates();
    let q;
    if(view === 'doing') {
        q = query(collection(db, 'bills'), where('status', '==', 'doing'), orderBy('createdAt', 'desc'));
    } else {
        q = query(collection(db, 'bills'), where('status', '==', 'done'), where('createdAt', '>=', dates.start), where('createdAt', '<=', dates.end), orderBy('createdAt', 'desc'));
    }
    const snap = await getDocs(q);
    list.innerHTML = snap.empty ? '<p style="text-align:center; color:#ccc;">ไม่มีข้อมูล</p>' : '';
    snap.forEach(d => {
        const b = d.data();
        const totalAmt = b.pieces.reduce((s, p) => s + (p.price * p.qty), 0);
        const totalQty = b.pieces.reduce((s, p) => s + p.qty, 0);
        const piecesEscaped = encodeURIComponent(JSON.stringify(b.pieces));
        list.innerHTML += `
            <div class="card" onclick="toggleBillActions(this)">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>คิว #${b.dailyNo}</b> <span style="margin-left:15px; font-size:0.8rem; color:#666; font-weight:300;">${formatTime(b.createdAt, view)}</span></div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        ${view === 'doing' ? `<button class="pay-toggle" onclick="event.stopPropagation(); togglePaidUI(this)">💰 ยังไม่จ่าย</button>` : ''}
                        <span><small style="color:#888">${totalQty} ชิ้น |</small> <b>${totalAmt}฿</b></span>
                    </div>
                </div>
                <div style="font-size:1.3rem; margin:8px 0">${b.pieces.map(p => `• ${p.items.join('+')} x${p.qty}`).join('<br>')}</div>
                ${b.note ? `<div style="font-size:0.9rem; color:var(--primary-dark)">📝 ${b.note}</div>` : ''}
                <div class="bill-actions">
                    ${view === 'doing' ? `<button class="btn btn-save btn-sm" onclick="updateStatus('${b.globalNo}','done')" style="flex:2">✅ เสร็จแล้ว</button>` : ''}
                    <button class="btn btn-outline btn-sm" onclick="editBill('${b.globalNo}', '${piecesEscaped}', '${b.note || ""}')">✏️ แก้ไข</button>
                    <button class="btn btn-outline btn-sm" onclick="deleteBill('${b.globalNo}')" style="color:var(--danger)">🗑️ ลบ</button>
                </div>
            </div>`;
    });
};

async function renderSummary() {
    const dates = getFilterDates();
    const q = query(collection(db, 'bills'), 
        where('createdAt', '>=', dates.start), 
        where('createdAt', '<=', dates.end)
    );
    const snap = await getDocs(q);
    
    let totalIncome = 0, totalPieces = 0, count = 0;
    let comboStats = {}; 

    snap.forEach(d => {
        const b = d.data();
        b.pieces.forEach(p => {
            const income = (p.price * p.qty);
            totalIncome += income;
            totalPieces += p.qty;
            const comboName = p.items.join('+');
            if(!comboStats[comboName]) {
                comboStats[comboName] = { qty: 0, income: 0 };
            }
            comboStats[comboName].qty += p.qty;
            comboStats[comboName].income += income;
        });
        count++;
    });

    const sortedCombos = Object.entries(comboStats).sort((a, b) => {
        if (b[1].qty !== a[1].qty) return b[1].qty - a[1].qty;
        return b[1].income - a[1].income;
    });

    document.getElementById('summaryBox').innerHTML = `
        <span class="section-title">สรุปยอดขาย</span>
        <div style="text-align:center; padding:15px 0;">
            <h1 style="margin:0; color:var(--success);">${totalIncome.toLocaleString()}.-</h1>
            <p style="margin:5px 0; color:#888;">รายได้รวมจาก ${count} บิล (${totalPieces} ชิ้น)</p>
        </div>
        
        <span class="section-title">📊 อันดับรายการที่ขายดี</span>
        <div style="margin-top:10px;">
            ${sortedCombos.map(([name, data], idx) => `
                <div class="stat-row" style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f5f5f5;">
                    <span style="font-size:0.95rem;">${idx + 1}. ${name}</span>
                    <div style="white-space:nowrap;">
                        <b style="color:var(--secondary)">${data.qty} ชิ้น</b>
                        <span style="color:#888; font-size:0.85rem; margin-left:5px;">(${data.income.toLocaleString()}฿)</span>
                    </div>
                </div>
            `).join('')}
        </div>
        ${sortedCombos.length === 0 ? '<p style="text-align:center; color:#ccc; padding:20px;">ไม่มีข้อมูลในช่วงเวลานี้</p>' : ''}
    `;
}

// --- ฟังก์ชันรันเลขคิวแบบออฟไลน์ (นับจากข้อมูลในเครื่อง) ---
// --- ฟังก์ชันรันเลขคิวแบบหาค่าสูงสุด (ป้องกันเลขซ้ำแม้มีการลบบิล) ---
// --- ฟังก์ชันรันเลขคิวแบบหาค่าสูงสุด (ดึงจาก Server เพื่อความแม่นยำ) ---
async function getNextDailyNo(date) {
    // เพิ่ม { getDocsFromCache: false } เพื่อไม่ให้เอาข้อมูลเก่าในเครื่องมานับซ้ำ
    const q = query(collection(db, 'bills'), where('date', '==', date));
    
    // เราจะลองดึงจาก Server ก่อน ถ้าเน็ตไม่มีจริงๆ ค่อยดึงจาก Cache
    let snap;
    try {
        // พยายามดึงข้อมูลล่าสุดจาก Server
        snap = await getDocs(q);
    } catch (e) {
        // ถ้าดึงไม่ได้ (เช่น ไม่มีเน็ต) ระบบจะใช้ข้อมูลใน Cache อัตโนมัติ
        console.log("Using cache for queue number");
    }
    
    if (!snap || snap.empty) return 1;

    let maxNo = 0;
    snap.forEach(d => {
        const b = d.data();
        if (b.dailyNo && typeof b.dailyNo === 'number' && b.dailyNo > maxNo) {
            maxNo = b.dailyNo;
        }
    });
    
    return maxNo + 1;
}
window.saveBill = async () => {
    if(!currentPieces.length) return showToast('กรุณาเพิ่มรายการขนม', 'warning');
    
    try {
        const todayStr = new Date().toISOString().slice(0,10);
        let dailyNo;
        
        if(editingBillId) {
            // ถ้าเป็นการแก้ไขบิลเดิม ให้ใช้เลขคิวเดิม
            const q = query(collection(db, 'bills'), where('globalNo','==',editingBillId));
            const snap = await getDocs(q);
            if(!snap.empty) {
                dailyNo = snap.docs[0].data().dailyNo;
            } else {
                dailyNo = await getNextDailyNo(todayStr);
            }
        } else {
            // ถ้าเป็นบิลใหม่ ให้หาเลขคิวถัดไป
            dailyNo = await getNextDailyNo(todayStr);
        }

        const billId = editingBillId || crypto.randomUUID();
        const billData = { 
            globalNo: billId, 
            dailyNo: dailyNo, 
            pieces: currentPieces, 
            note: document.getElementById('billNote').value, 
            status: 'doing', 
            updatedAt: new Date().toISOString(), 
            date: todayStr 
        };
        
        if (!editingBillId) billData.createdAt = new Date().toISOString();
        
        await setDoc(doc(db, 'bills', billId), billData, { merge: true });
        
        currentPieces = []; 
        editingBillId = null; 
        document.getElementById('billNote').value = '';
        
        renderCurrent(); 
        window.switchView('doing'); 
        showToast(`บันทึกคิว #${dailyNo} เรียบร้อย!`);
    } catch(e) { 
        console.error(e);
        showToast('เกิดข้อผิดพลาดในการบันทึก', 'error'); 
    }
};
window.editBill = (id, piecesJson, note) => {
    currentPieces = JSON.parse(decodeURIComponent(piecesJson));
    editingBillId = id; document.getElementById('billNote').value = note;
    renderCurrent(); window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.deleteBill = async (id) => {
    const result = await Swal.fire({ title: 'ลบบิลนี้หรือไม่?', text: "ข้อมูลจะถูกลบถาวร", icon: 'warning', showCancelButton: true, confirmButtonColor: 'var(--danger)', cancelButtonColor: '#aaa', confirmButtonText: 'ใช่, ลบเลย!', cancelButtonText: 'ยกเลิก', reverseButtons: true });
    if (result.isConfirmed) {
        await deleteDoc(doc(db, 'bills', id)); renderBills();
        Swal.fire({ title: 'ลบเรียบร้อย!', icon: 'success', timer: 1500, showConfirmButton: false });
    }
};

window.updateStatus = async (id, status) => {
    await setDoc(doc(db, 'bills', id), { status }, { merge: true });
    renderBills();
};

function showToast(msg, icon = 'success') {
    const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 2000, timerProgressBar: true });
    Toast.fire({ icon: icon, title: msg });
}

document.getElementById('darkToggle').onclick = () => document.body.classList.toggle('dark');
renderBills();
</script>
